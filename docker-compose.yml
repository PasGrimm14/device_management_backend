services:

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - mysql_data:/var/lib/mysql
    # Die Datenbank geben wir weiterhin nach außen frei (auf dem neuen Port 3307), 
    # damit du dich z. B. mit DBeaver von deinem PC aus verbinden kannst.
    ports:
      - "3307:3306"          
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # KEINE Ports angegeben! Der Proxy greift intern darauf zu.

  app:
    build: .
    restart: unless-stopped
    # env_file: .env
    environment:
      DB_HOST: db
      CORS_ORIGINS: ${CORS_ORIGINS}
      BASE_URL: ${BASE_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-geraete-bilder}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    # KEINE Ports angegeben! Der Proxy greift intern darauf zu.
  
  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    environment:
      PMA_HOST: db  
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    # KEINE Ports angegeben! Der Proxy greift intern darauf zu.

volumes:
  mysql_data:
  minio_data:
