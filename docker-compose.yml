services:

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"          # erreichbar vom Host für z. B. DBeaver
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build: .
    restart: unless-stopped
    env_file: .env             # liest alle Werte aus der lokalen .env
    environment:
      DB_HOST: db              # überschreibt DB_HOST aus der .env mit dem Service-Namen
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
  
  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db  # Muss dem Service-Namen der Datenbank entsprechen
      PMA_PORT: 3306
      PMA_ARBITRARY: 1

volumes:
  mysql_data:
